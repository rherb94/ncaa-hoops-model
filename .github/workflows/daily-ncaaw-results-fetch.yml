name: Daily NCAAW Game Results

on:
  schedule:
    # 1:05 AM ET = 06:05 UTC — after late west coast games finish
    - cron: '5 6 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to fetch results for (YYYY-MM-DD). Defaults to yesterday ET.'
        required: false

jobs:
  results:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Fetch game results from ESPN (NCAAW)
        env:
          DATE: ${{ inputs.date || '' }}
          LEAGUE: ncaaw
        run: npx tsx src/scripts/fetchGameResults.ts

      - name: Commit results if new
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/ncaaw/results/
          if git diff --cached --quiet; then
            echo "No new results to commit."
          else
            DATE_STR=$(date -u +%Y-%m-%d)
            git commit -m "chore: ncaaw game results ${DATE_STR} [skip ci]"
            git pull --rebase origin main
            git push
          fi
