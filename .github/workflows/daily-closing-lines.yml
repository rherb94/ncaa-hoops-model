name: Daily Closing Lines Snapshot

# Runs TWICE to capture closing lines across the full NCAAB slate:
#   Run 1 — 3:00pm ET (20:00 UTC): catches early games before they tip
#   Run 2 — 7:30pm ET (00:30 UTC next day): catches evening games
#
# TheOddsAPI only returns UPCOMING games, so:
#   - Games that have already started are preserved from the earlier run
#   - Both snapshots merge into a single file per date

on:
  schedule:
    - cron: '0 20 * * *'    # 3:00pm ET (winter) / 4:00pm ET (summer)
    - cron: '30 0 * * *'    # 7:30pm ET (winter) / 8:30pm ET (summer)
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to snapshot (YYYY-MM-DD). Defaults to today ET.'
        required: false

jobs:
  closing-lines:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Fetch closing line snapshot
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          DATE: ${{ inputs.date || '' }}
        run: npx tsx src/scripts/fetchClosingLines.ts

      - name: Commit snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add src/data/closing_lines/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            DATE_STR=$(date -u +%Y-%m-%d-%H%M)
            git commit -m "chore: closing line snapshot ${DATE_STR} [skip ci]"
            git push
          fi
